<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - Anonymix</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito Sans', 'system-ui', 'sans-serif'],
                        display: ['Quicksand', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="min-h-screen bg-gray-100 font-sans text-gray-900">

    <div id="app" class="max-w-[428px] mx-auto min-h-screen bg-white flex flex-col">

        <!-- ============================================================
             HEADER
             ============================================================ -->
        <header class="px-4 py-3 border-b border-gray-200 relative flex items-center">
            <button onclick="history.back()" class="w-8 text-gray-600 hover:text-gray-900 transition-colors">
                <svg class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M12.79 5.23a.75.75 0 01-.02 1.06L8.832 10l3.938 3.71a.75.75 0 11-1.04 1.08l-4.5-4.25a.75.75 0 010-1.08l4.5-4.25a.75.75 0 011.06.02z" clip-rule="evenodd"/>
                </svg>
            </button>
            <h1 class="text-sm font-semibold font-display absolute left-1/2 -translate-x-1/2">Profile</h1>
            <button id="edit-btn" onclick="toggleEdit()" class="ml-auto text-sm font-medium text-blue-500">Edit</button>
        </header>

        <!-- ============================================================
             MAIN CONTENT
             ============================================================ -->
        <main class="flex-1">

            <!-- ========================================================
                 AVATAR + NAME (view state)
                 ======================================================== -->
            <div id="profile-view" class="flex flex-col items-center pt-6 pb-4">
                <div id="avatar-display" class="w-20 h-20 rounded-full flex items-center justify-center text-2xl font-bold text-white mb-3" style="background-color: #3b82f6">
                    S
                </div>
                <h2 id="name-display" class="text-lg font-semibold font-display"></h2>
            </div>

            <!-- ========================================================
                 AVATAR + NAME (edit state)
                 ======================================================== -->
            <div id="profile-edit" class="hidden px-4 pt-6 pb-4">
                <div class="flex flex-col items-center mb-4">
                    <div id="avatar-edit" class="w-20 h-20 rounded-full flex items-center justify-center text-2xl font-bold text-white mb-2 relative cursor-pointer" style="background-color: #3b82f6">
                        S
                        <div class="absolute inset-0 rounded-full bg-black/30 flex items-center justify-center">
                            <svg class="w-6 h-6 text-white" viewBox="0 0 20 20" fill="currentColor">
                                <path d="M1 8a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 018.07 3h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0016.07 6H17a2 2 0 012 2v7a2 2 0 01-2 2H3a2 2 0 01-2-2V8zm9 3a2 2 0 100-4 2 2 0 000 4z"/>
                            </svg>
                        </div>
                    </div>
                </div>
                <div class="space-y-3">
                    <div>
                        <label class="block text-[10px] font-semibold text-gray-500 uppercase tracking-wide mb-1">Display Name</label>
                        <input id="name-input" type="text" class="w-full px-3 py-2.5 text-sm border border-gray-300 rounded-xl focus:outline-none focus:border-green-400 focus:ring-1 focus:ring-green-400" />
                    </div>
                    </div>
            </div>

            <!-- ========================================================
                 LINKED PLATFORM
                 ======================================================== -->
            <div class="border-t border-gray-200">
                <div class="px-4 py-3">
                    <p class="text-[10px] font-semibold text-gray-500 uppercase tracking-wide mb-2">Linked Platform</p>
                    <div id="platform-list" class="space-y-2">
                        <!-- Rendered by JS -->
                    </div>
                </div>
            </div>


            <!-- ========================================================
                 ACCOUNT ACTIONS
                 ======================================================== -->
            <!-- ========================================================
                 NOTIFICATIONS
                 ======================================================== -->
            <div class="border-t border-gray-200">
                <div class="px-4 py-3">
                    <p class="text-[10px] font-semibold text-gray-500 uppercase tracking-wide mb-2">Notifications</p>
                    <div class="space-y-1">
                        <label class="flex items-center justify-between py-2">
                            <span class="text-sm text-gray-700">New tape available</span>
                            <input type="checkbox" checked class="w-4 h-4 accent-green-500 rounded" />
                        </label>
                        <label class="flex items-center justify-between py-2">
                            <span class="text-sm text-gray-700">Playlist ready</span>
                            <input type="checkbox" checked class="w-4 h-4 accent-green-500 rounded" />
                        </label>
                        <label class="flex items-center justify-between py-2">
                            <span class="text-sm text-gray-700">Time to comment</span>
                            <input type="checkbox" checked class="w-4 h-4 accent-green-500 rounded" />
                        </label>
                        <label class="flex items-center justify-between py-2">
                            <span class="text-sm text-gray-700">Comments revealed</span>
                            <input type="checkbox" checked class="w-4 h-4 accent-green-500 rounded" />
                        </label>
                        <label class="flex items-center justify-between py-2">
                            <span class="text-sm text-gray-700">Deadline reminders</span>
                            <input type="checkbox" checked class="w-4 h-4 accent-green-500 rounded" />
                        </label>
                    </div>
                </div>
            </div>

            <!-- ========================================================
                 SIGN OUT
                 ======================================================== -->
            <div class="border-t border-gray-200">
                <div class="px-4 py-3">
                    <button onclick="confirmSignOut()" class="w-full py-2.5 text-sm font-medium text-red-500 hover:bg-red-50 rounded-xl transition-colors">
                        Sign out
                    </button>
                </div>
            </div>

        </main>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-lg shadow-lg z-50">
        <span id="toast-message"></span>
    </div>

    <script>
        /**
         * Page: Profile
         */

        let userData = null;
        let isEditing = false;

        // ================================================================
        // DATA LOADING
        // ================================================================
        async function loadProfile() {
            try {
                const response = await fetch('data/demo-data.json');
                const data = await response.json();
                userData = data.user;
                console.log('📦 Profile loaded:', userData.name);
                return userData;
            } catch (error) {
                console.error('❌ Failed to load profile:', error);
                return null;
            }
        }

        // ================================================================
        // RENDERING
        // ================================================================
        function renderPlatformRow(name, icon, connected, username) {
            const borderClass = connected ? 'bg-gray-50 border border-gray-200' : 'border border-dashed border-gray-300';
            const usernameHtml = connected && username ? `<p class="text-xs text-gray-400">@${username}</p>` : '';
            const actionHtml = connected
                ? '<span class="text-[10px] font-medium text-green-600 bg-green-50 px-2 py-0.5 rounded-full">Connected</span>'
                : '<button class="text-xs font-medium text-blue-500">Connect</button>';

            return `
                <div class="flex items-center gap-3 px-3 py-2.5 ${borderClass} rounded-xl">
                    <div class="w-8 h-8 rounded-full flex items-center justify-center">${icon}</div>
                    <div class="flex-1">
                        <p class="text-sm font-medium text-gray-900">${name}</p>
                        ${usernameHtml}
                    </div>
                    ${actionHtml}
                </div>
            `;
        }

        function renderProfile(user) {
            // View state
            document.getElementById('name-display').textContent = user.name;

            // Platforms
            const spotifyIcon = `<svg class="w-5 h-5 text-[#1DB954]" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>`;
            const youtubeIcon = `<svg class="w-5 h-5 text-[#FF0000]" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>`;

            const isSpotify = user.platform === 'spotify';
            const platformList = document.getElementById('platform-list');
            const spotifyConnected = isSpotify;
            const youtubeConnected = !isSpotify;

            platformList.innerHTML = renderPlatformRow('Spotify', spotifyIcon, spotifyConnected, spotifyConnected ? user.platformUsername : null)
                + renderPlatformRow('YouTube Music', youtubeIcon, youtubeConnected, youtubeConnected ? user.platformUsername : null);

        }

        // ================================================================
        // EDIT MODE
        // ================================================================
        function toggleEdit() {
            isEditing = !isEditing;
            const editBtn = document.getElementById('edit-btn');

            if (isEditing) {
                editBtn.textContent = 'Save';
                editBtn.classList.remove('text-blue-500');
                editBtn.classList.add('text-green-500');
                document.getElementById('profile-view').classList.add('hidden');
                document.getElementById('profile-edit').classList.remove('hidden');
                document.getElementById('name-input').value = userData.name;
                document.getElementById('email-input').value = userData.email;
            } else {
                // Save
                userData.name = document.getElementById('name-input').value.trim() || userData.name;

                editBtn.textContent = 'Edit';
                editBtn.classList.remove('text-green-500');
                editBtn.classList.add('text-blue-500');
                document.getElementById('profile-view').classList.remove('hidden');
                document.getElementById('profile-edit').classList.add('hidden');
                renderProfile(userData);
                showToast('Profile saved');
            }
        }

        // ================================================================
        // SIGN OUT
        // ================================================================
        function confirmSignOut() {
            if (confirm('Sign out of Anonymix?')) {
                showToast('Signed out');
            }
        }

        // ================================================================
        // TOAST
        // ================================================================
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2500);
        }

        // ================================================================
        // INITIALIZATION
        // ================================================================
        async function init() {
            console.log('📄 Profile loaded');
            const user = await loadProfile();
            if (user) renderProfile(user);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
