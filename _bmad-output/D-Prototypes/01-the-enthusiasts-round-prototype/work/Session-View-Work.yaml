  - number: 4
    name: "Tape card state variants"
    objects: []
    description: "Submitting (with/without submission), Playlist Ready, Commenting (before/after), Completed, Upcoming states"
    status: complete
    completed: 2026-03-25

  - number: 5
    name: "Crate-flip interaction"
    objects: [crate-flip]
