view: Session View (Tape List)
view_id: view-b
scenario_steps: ["01.2", "01.4"]
device: mobile-only
fidelity: gray-model

tape_card_states:
  - submitting
  - playlist_ready
  - commenting
  - completed

cassette_ratio: "335w x 260h (landscape)"

objects:
  - id: session-header
    description: "← back | session name (centered) | gear icon (host only)"
  - id: tape-crate
    description: Vertical stack container with depth perspective
  - id: past-spine
    description: Thin, faded, progressively narrower rectangles above active card
  - id: active-tape-card
    description: Landscape cassette-ratio card with full tape detail
  - id: card-header
    description: "TAPE N (left) | status badge + deadline (right)"
  - id: prompt-text
    description: Tape prompt, 18px, left-aligned
  - id: progress-bar
    description: "X/Y submitted + thin progress bar"
  - id: user-submission
    description: "Your pick label, song + artist, Change link"
  - id: wait-hint
    description: "Waiting for N more"
  - id: future-spine
    description: Thin rectangles peeking below active card
  - id: crate-flip
    description: Scroll/swipe navigation between tapes with physical animation

sections:
  - number: 1
    name: "Session header + crate shell"
    objects: [session-header, tape-crate]
    description: "Back nav, session name, gear icon, crate container with centered layout"
    status: complete
