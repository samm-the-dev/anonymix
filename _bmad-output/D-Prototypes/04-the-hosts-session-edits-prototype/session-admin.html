<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Admin - Anonymix</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Nunito Sans', 'system-ui', 'sans-serif'],
                        display: ['Quicksand', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        .sheet-backdrop {
            transition: opacity 0.2s ease-out;
        }
        .sheet-content {
            transition: transform 0.25s ease-out;
            transform: translateY(100%);
        }
        .sheet-open .sheet-content {
            transform: translateY(0);
        }
        .sheet-open .sheet-backdrop {
            opacity: 1;
        }
    </style>
</head>
<body class="min-h-screen bg-gray-100 font-sans text-gray-900">

    <div id="app" class="max-w-[428px] mx-auto min-h-screen bg-white flex flex-col relative">

        <!-- ============================================================
             HEADER (Session View with host controls)
             ============================================================ -->
        <header class="px-4 py-3 border-b border-gray-200 relative flex items-center">
            <a href="#" class="w-8 text-gray-600">
                <svg class="w-5 h-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M12.79 5.23a.75.75 0 01-.02 1.06L8.832 10l3.938 3.71a.75.75 0 11-1.04 1.08l-4.5-4.25a.75.75 0 010-1.08l4.5-4.25a.75.75 0 011.06.02z" clip-rule="evenodd"/>
                </svg>
            </a>

            <h1 id="header-title" class="text-lg font-semibold font-display absolute left-1/2 -translate-x-1/2">Comic Book Fuckery</h1>

            <div class="w-8 ml-auto"></div>
        </header>

        <!-- ============================================================
             SESSION SETTINGS (inline, view/edit)
             ============================================================ -->
        <div id="session-settings" class="px-4 py-3 border-b border-gray-200">
            <!-- View state -->
            <div id="settings-view">
                <div class="flex items-start justify-between">
                    <div class="min-w-0 flex-1">
                        <h2 id="settings-view-name" class="text-base font-semibold font-display text-gray-900"></h2>
                        <p id="settings-view-desc" class="text-sm text-gray-400 mt-0.5"></p>
                    </div>
                    <button onclick="toggleSettingsEdit(true)" class="text-xs font-medium text-blue-500 flex-shrink-0 ml-3 mt-1">Edit</button>
                </div>
                <div class="flex gap-3 mt-2">
                    <span class="text-[10px] text-gray-400"><span class="font-medium text-gray-500">Submit:</span> <span id="settings-view-submit">2 days</span></span>
                    <span class="text-[10px] text-gray-400"><span class="font-medium text-gray-500">Comment:</span> <span id="settings-view-comment">5 days</span></span>
                </div>
            </div>

            <!-- Edit state -->
            <div id="settings-edit" class="hidden space-y-3">
                <div>
                    <label class="block text-[10px] font-semibold text-gray-500 uppercase tracking-wide mb-1">Session Name</label>
                    <input id="settings-name" type="text" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:border-green-400 focus:ring-1 focus:ring-green-400" />
                </div>
                <div>
                    <label class="block text-[10px] font-semibold text-gray-500 uppercase tracking-wide mb-1">Description</label>
                    <textarea id="settings-desc" rows="2" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg resize-none focus:outline-none focus:border-green-400 focus:ring-1 focus:ring-green-400"></textarea>
                </div>
                <div class="flex gap-3">
                    <div class="flex-1">
                        <label class="block text-[10px] font-semibold text-gray-500 uppercase tracking-wide mb-1">Submit window</label>
                        <select id="settings-submit-window" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none">
                            <option>1 day</option>
                            <option selected>2 days</option>
                            <option>3 days</option>
                            <option>5 days</option>
                            <option>7 days</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="block text-[10px] font-semibold text-gray-500 uppercase tracking-wide mb-1">Comment window</label>
                        <select id="settings-comment-window" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none">
                            <option>3 days</option>
                            <option selected>5 days</option>
                            <option>7 days</option>
                            <option>14 days</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleSettingsEdit(false)" class="flex-1 py-2 rounded-lg text-sm font-medium text-gray-600 border border-gray-300 hover:bg-gray-50 transition-colors">Cancel</button>
                    <button onclick="saveSettings()" class="flex-1 py-2 rounded-lg text-sm font-semibold text-white bg-green-500 hover:bg-green-600 transition-colors">Save</button>
                </div>
            </div>
        </div>

        <!-- ============================================================
             TAPE LIST (simplified host view)
             ============================================================ -->
        <main class="flex-1 overflow-y-auto">
            <div id="tape-list" class="px-4 py-2">
                <!-- Rendered by JS -->
            </div>
        </main>

        <!-- ============================================================
             MANAGE MEMBERS FOOTER
             ============================================================ -->
        <div class="px-4 py-3 border-t border-gray-200 bg-white">
            <button
                onclick="openSheet('members')"
                class="w-full py-2.5 rounded-xl text-sm font-medium text-gray-600 border border-gray-300 hover:bg-gray-50 transition-colors flex items-center justify-center gap-2"
            >
                <svg class="w-4 h-4 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M7 8a3 3 0 100-6 3 3 0 000 6zM14.5 9a2.5 2.5 0 100-5 2.5 2.5 0 000 5zM1.615 16.428a1.224 1.224 0 01-.569-1.175 6.002 6.002 0 0111.908 0c.058.467-.172.92-.57 1.174A9.953 9.953 0 017 18a9.953 9.953 0 01-5.385-1.572zM14.5 16h-.106c.07-.297.088-.611.048-.933a7.47 7.47 0 00-1.588-3.755 4.502 4.502 0 015.874 2.636.818.818 0 01-.36.98A7.465 7.465 0 0114.5 16z"/>
                </svg>
                Manage Members
            </button>
        </div>

        <!-- ============================================================
             MEMBERS SHEET
             ============================================================ -->
        <div id="sheet-members" class="fixed inset-0 z-50 hidden">
            <div class="sheet-backdrop absolute inset-0 bg-black/40 opacity-0" onclick="closeSheet('members')"></div>
            <div class="sheet-content absolute bottom-0 left-0 right-0 max-w-[428px] mx-auto bg-white rounded-t-2xl max-h-[80vh] overflow-y-auto">
                <div class="px-4 py-3 border-b border-gray-200 flex items-center justify-between">
                    <h2 class="text-base font-semibold font-display">Members</h2>
                    <button onclick="closeSheet('members')" class="text-sm font-medium text-blue-500">Done</button>
                </div>
                <div id="member-list" class="px-4 py-2">
                    <!-- Rendered by JS -->
                </div>
                <div class="px-4 pb-4">
                    <button onclick="copyInviteLink()" class="w-full py-2.5 rounded-xl text-sm font-medium text-green-600 border border-green-200 hover:bg-green-50 transition-colors">
                        Copy invite link
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white px-6 py-3 rounded-lg shadow-lg z-[60]">
        <span id="toast-message"></span>
    </div>

    <script>
        /**
         * Page: Session Admin
         * Host view with settings, members, and edit overlays
         */

        let sessionData = null;
        let editMode = false;

        // ================================================================
        // DATA LOADING
        // ================================================================
        async function loadData() {
            try {
                const response = await fetch('data/demo-data.json');
                const data = await response.json();
                sessionData = data.session;
                console.log('📦 Admin data loaded');
                return sessionData;
            } catch (error) {
                console.error('❌ Failed to load data:', error);
                return null;
            }
        }

        // ================================================================
        // TAPE LIST RENDERING
        // ================================================================
        function renderTapeRow(tape, i, editable) {
            const statusLabel = tape.status.charAt(0).toUpperCase() + tape.status.slice(1);
            const statusColors = {
                completed: 'bg-purple-100 text-purple-700',
                commenting: 'bg-amber-100 text-amber-700',
                submitting: 'bg-green-100 text-green-700',
                upcoming: 'bg-gray-100 text-gray-500'
            };
            const badgeClass = statusColors[tape.status] || statusColors.upcoming;

            if (editable) {
                return `
                    <div class="py-3 border-b border-gray-100 last:border-0" data-tape-index="${i}">
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-xs font-semibold uppercase tracking-wider text-gray-400">Tape ${tape.number}</span>
                            <div class="flex items-center gap-1">
                                <span class="text-[10px] font-semibold px-2 py-0.5 rounded-full ${badgeClass}">${statusLabel}</span>
                                <div class="flex flex-col gap-0.5 ml-1">
                                    <button onclick="moveTape(${i}, -1)" class="text-gray-400 hover:text-gray-600 ${i <= firstUpcomingIndex() ? 'opacity-20 pointer-events-none' : ''}">
                                        <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                                            <path fill-rule="evenodd" d="M14.77 12.79a.75.75 0 01-1.06-.02L10 8.832 6.29 12.77a.75.75 0 11-1.08-1.04l4.25-4.5a.75.75 0 011.08 0l4.25 4.5a.75.75 0 01-.02 1.06z" clip-rule="evenodd"/>
                                        </svg>
                                    </button>
                                    <button onclick="moveTape(${i}, 1)" class="text-gray-400 hover:text-gray-600 ${i >= sessionData.tapes.length - 1 ? 'opacity-20 pointer-events-none' : ''}">
                                        <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                                            <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <input
                            type="text"
                            value="${tape.name}"
                            oninput="updateTapeName(${i}, this.value)"
                            class="w-full px-3 py-2 text-sm font-semibold font-display border border-gray-200 rounded-lg mb-1.5 focus:outline-none focus:border-green-400 focus:ring-1 focus:ring-green-400"
                        />
                        <input
                            type="text"
                            value="${tape.desc}"
                            oninput="updateTapeDesc(${i}, this.value)"
                            class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:border-green-400 focus:ring-1 focus:ring-green-400"
                        />
                    </div>
                `;
            }

            return `
                <div class="py-3 border-b border-gray-100 last:border-0">
                    <div class="flex items-center justify-between mb-0.5">
                        <span class="text-xs font-semibold uppercase tracking-wider text-gray-400">Tape ${tape.number}</span>
                        <span class="text-[10px] font-semibold px-2 py-0.5 rounded-full ${badgeClass}">${statusLabel}</span>
                    </div>
                    <p class="text-sm font-semibold font-display text-gray-900">${tape.name}</p>
                    <p class="text-xs text-gray-400">${tape.desc}</p>
                </div>
            `;
        }

        function renderTapeList() {
            const container = document.getElementById('tape-list');
            const locked = sessionData.tapes.filter(t => t.status !== 'upcoming');
            const upcoming = sessionData.tapes.filter(t => t.status === 'upcoming');

            let html = '';

            // Past/active tapes (always read-only)
            locked.forEach((tape, i) => {
                const realIndex = sessionData.tapes.indexOf(tape);
                html += renderTapeRow(tape, realIndex, false);
            });

            // Edit upcoming divider
            if (upcoming.length > 0 || editMode) {
                if (editMode) {
                    html += `
                        <div class="flex gap-2 my-2">
                            <button onclick="toggleEditMode()" class="flex-1 py-2 rounded-lg text-xs font-medium text-gray-600 border border-gray-300 hover:bg-gray-50 transition-colors">Cancel</button>
                            <button onclick="saveUpcoming()" class="flex-1 py-2 rounded-lg text-xs font-semibold text-white bg-green-500 hover:bg-green-600 transition-colors">Save</button>
                        </div>
                    `;
                } else {
                    html += `
                        <button
                            id="edit-mode-btn"
                            onclick="toggleEditMode()"
                            class="w-full my-2 py-2 rounded-lg text-xs font-medium text-gray-500 bg-gray-50 border border-gray-200 hover:opacity-80 transition-colors"
                        >
                            Edit upcoming
                        </button>
                    `;
                }
            }

            // Upcoming tapes
            upcoming.forEach(tape => {
                const realIndex = sessionData.tapes.indexOf(tape);
                html += renderTapeRow(tape, realIndex, editMode);
            });

            // Add tape button in edit mode
            if (editMode) {
                html += `
                    <button onclick="addNewTape()" class="w-full mt-2 py-2.5 rounded-xl text-sm font-medium text-gray-500 border border-dashed border-gray-300 hover:bg-gray-50 transition-colors">
                        + Add another tape
                    </button>
                `;
            }

            container.innerHTML = html;
        }

        // ================================================================
        // EDIT MODE
        // ================================================================
        function toggleEditMode() {
            editMode = !editMode;
            renderTapeList();
        }

        function saveUpcoming() {
            editMode = false;
            renderTapeList();
            showToast('Tapes saved');
        }

        function updateTapeName(index, value) {
            sessionData.tapes[index].name = value;
        }

        function updateTapeDesc(index, value) {
            sessionData.tapes[index].desc = value;
        }

        function firstUpcomingIndex() {
            return sessionData.tapes.findIndex(t => t.status === 'upcoming');
        }

        function moveTape(index, direction) {
            const newIndex = index + direction;
            const firstUpcoming = firstUpcomingIndex();
            if (newIndex < firstUpcoming || newIndex >= sessionData.tapes.length) return;

            const temp = sessionData.tapes[index];
            sessionData.tapes[index] = sessionData.tapes[newIndex];
            sessionData.tapes[newIndex] = temp;

            // Renumber all tapes
            sessionData.tapes.forEach((t, i) => t.number = i + 1);
            renderTapeList();
        }

        function addNewTape() {
            const num = sessionData.tapes.length + 1;
            sessionData.tapes.push({ number: num, name: '', desc: '', status: 'upcoming' });
            renderTapeList();
            showToast('Tape added');
        }

        // ================================================================
        // INLINE SETTINGS (Section view/edit)
        // ================================================================
        function renderSettingsView() {
            document.getElementById('settings-view-name').textContent = sessionData.name;
            document.getElementById('settings-view-desc').textContent = sessionData.description || '';
            document.getElementById('settings-view-submit').textContent = sessionData.submissionWindow;
            document.getElementById('settings-view-comment').textContent = sessionData.commentWindow;
            document.getElementById('header-title').textContent = sessionData.name;
        }

        function toggleSettingsEdit(show) {
            document.getElementById('settings-view').classList.toggle('hidden', show);
            document.getElementById('settings-edit').classList.toggle('hidden', !show);

            if (show) {
                document.getElementById('settings-name').value = sessionData.name;
                document.getElementById('settings-desc').value = sessionData.description || '';
            }
        }

        function saveSettings() {
            sessionData.name = document.getElementById('settings-name').value.trim();
            sessionData.description = document.getElementById('settings-desc').value.trim();
            sessionData.submissionWindow = document.getElementById('settings-submit-window').value;
            sessionData.commentWindow = document.getElementById('settings-comment-window').value;
            toggleSettingsEdit(false);
            renderSettingsView();
            showToast('Settings saved');
        }

        // ================================================================
        // SHEETS (members only now)
        // ================================================================
        function openSheet(name) {
            const sheet = document.getElementById(`sheet-${name}`);
            sheet.classList.remove('hidden');

            if (name === 'members') {
                renderMemberList();
            }

            requestAnimationFrame(() => sheet.classList.add('sheet-open'));
        }

        function closeSheet(name) {
            const sheet = document.getElementById(`sheet-${name}`);
            sheet.classList.remove('sheet-open');
            setTimeout(() => sheet.classList.add('hidden'), 250);
        }

        // ================================================================
        // MEMBERS
        // ================================================================
        let openMenuId = null;

        function renderMemberList() {
            const container = document.getElementById('member-list');
            container.innerHTML = sessionData.players.map(p => `
                <div class="py-3 border-b border-gray-100 last:border-0 flex items-center gap-3">
                    <div class="w-9 h-9 rounded-full flex items-center justify-center text-sm font-semibold text-white" style="background-color: ${p.avatarColor}">
                        ${p.avatar}
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-semibold text-gray-900">${p.name}</p>
                        ${p.isHost ? '<span class="text-[10px] text-gray-400">Host</span>' : ''}
                    </div>
                    ${!p.isHost ? `
                        <div class="relative">
                            <button onclick="toggleMemberMenu('${p.id}')" class="w-7 h-7 flex items-center justify-center text-gray-400 hover:text-gray-600 rounded-full hover:bg-gray-100">
                                <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                                    <circle cx="10" cy="4" r="1.5"/>
                                    <circle cx="10" cy="10" r="1.5"/>
                                    <circle cx="10" cy="16" r="1.5"/>
                                </svg>
                            </button>
                            <div id="menu-${p.id}" class="hidden absolute right-0 top-8 bg-white border border-gray-200 rounded-xl shadow-lg z-10 overflow-hidden w-44">
                                <button onclick="confirmTransferHost('${p.id}', '${p.name}')" class="w-full px-4 py-2.5 text-sm text-left text-gray-700 hover:bg-gray-50 flex items-center gap-2">
                                    <svg class="w-4 h-4 text-gray-400" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M13.2 2.24a.75.75 0 00.04 1.06l2.1 1.95H6.75a.75.75 0 000 1.5h8.59l-2.1 1.95a.75.75 0 101.02 1.1l3.5-3.25a.75.75 0 000-1.1l-3.5-3.25a.75.75 0 00-1.06.04zm-6.4 8a.75.75 0 00-1.06-.04l-3.5 3.25a.75.75 0 000 1.1l3.5 3.25a.75.75 0 101.02-1.1l-2.1-1.95h8.59a.75.75 0 000-1.5H4.66l2.1-1.95a.75.75 0 00.04-1.06z" clip-rule="evenodd"/>
                                    </svg>
                                    Make host
                                </button>
                                <button onclick="confirmRemoveMember('${p.id}', '${p.name}')" class="w-full px-4 py-2.5 text-sm text-left text-red-500 hover:bg-red-50 flex items-center gap-2 border-t border-gray-100">
                                    <svg class="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M8.75 1A2.75 2.75 0 006 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 10.23 1.482l.149-.022.841 10.518A2.75 2.75 0 007.596 19h4.807a2.75 2.75 0 002.742-2.53l.841-10.519.149.023a.75.75 0 00.23-1.482A41.03 41.03 0 0014 4.193V3.75A2.75 2.75 0 0011.25 1h-2.5z" clip-rule="evenodd"/>
                                    </svg>
                                    Remove
                                </button>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function toggleMemberMenu(id) {
            // Close any open menu
            if (openMenuId && openMenuId !== id) {
                document.getElementById(`menu-${openMenuId}`)?.classList.add('hidden');
            }

            const menu = document.getElementById(`menu-${id}`);
            const isHidden = menu.classList.contains('hidden');
            menu.classList.toggle('hidden');
            openMenuId = isHidden ? id : null;
        }

        function confirmRemoveMember(id, name) {
            openMenuId = null;
            if (confirm(`Remove ${name} from the session?`)) {
                sessionData.players = sessionData.players.filter(p => p.id !== id);

                renderMemberList();
                showToast(`${name} removed`);
            } else {
                renderMemberList();
            }
        }

        function confirmTransferHost(id, name) {
            openMenuId = null;
            if (confirm(`Make ${name} the host? You'll lose host controls.`)) {
                sessionData.players.forEach(p => p.isHost = p.id === id);
                sessionData.admin = id;
                renderMemberList();
                showToast(`${name} is now host`);
            } else {
                renderMemberList();
            }
        }

        // ================================================================
        // INVITE
        // ================================================================
        function copyInviteLink() {
            navigator.clipboard?.writeText(sessionData.inviteLink);
            showToast('Invite link copied!');
        }

        // ================================================================
        // TOAST
        // ================================================================
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 2500);
        }

        // ================================================================
        // INITIALIZATION
        // ================================================================
        async function init() {
            console.log('📄 Session Admin loaded');
            const data = await loadData();
            if (data) {
                renderSettingsView();

                renderTapeList();
            }
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
